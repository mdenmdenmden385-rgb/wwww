<!DOCTYPE html>
<html>
<head>
  <title>Wheel of Fortune</title>
  <style>
    body { text-align:center; font-family:sans-serif; }
    #wheel {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 10px solid #333;
      margin: 50px auto;
      transition: transform 4s ease-out;
    }
  </style>
</head>
<body>

<h2>🎡 عجلة الحظ</h2>

<div id="wheel"></div>

<button onclick="spin()">لف العجلة</button>

<script>
function spin() {
    let random = Math.floor(Math.random() * 3600);
    document.getElementById("wheel").style.transform = rotate(${random}deg);
}
</script>

</body>
</html>
