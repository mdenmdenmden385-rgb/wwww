<!DOCTYPE html>
<html>
<head>
  <title>Wheel of Fortune</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    #wheel {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      margin: 40px auto;
      transition: transform 4s ease-out;
      background: conic-gradient(
        gold 0% 15%,
        #ff4d4d 15% 30%,
        #4dff88 30% 40%,
        #4da6ff 40% 45%,
        #999 45% 100%
      );
      position: relative;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    .labels {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>🎡 عجلة الحظ</h2>

<div id="wheel"></div>

<button onclick="spin()">لف العجلة</button>

<div class="labels">
  <p>1000 (15%)</p>
  <p>2000 (10%)</p>
  <p>5000 (5%)</p>
  <p>10000 (1%)</p>
  <p>حظ أوفر (69%)</p>
</div>

<script>
function spin() {

    let rand = Math.random() * 100;
    let deg = Math.floor(Math.random() * 3600);

    let result = "";

    if (rand < 1) {
        result = "10000 💰";
    }
    else if (rand < 6) {
        result = "5000 💰";
    }
    else if (rand < 16) {
        result = "2000 💰";
    }
    else if (rand < 31) {
        result = "1000 💰";
    }
    else {
        result = "حظ أوفر ❌";
    }

    document.getElementById("wheel").style.transform = "rotate(" + deg + "deg)";

    setTimeout(() => {
        alert("النتيجة: " + result);
    }, 4000);
}
</script>

</body>
</html>
