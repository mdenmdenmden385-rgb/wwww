<!DOCTYPE html>
<html>
<head>
  <title>Wheel</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    .container {
      margin-top: 50px;
    }

    #wheel {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      margin: 20px auto;
      position: relative;
      transition: transform 4s ease-out;
      background: conic-gradient(
        red 0deg 60deg,
        yellow 60deg 120deg,
        green 120deg 180deg,
        blue 180deg 240deg,
        orange 240deg 300deg,
        purple 300deg 360deg
      );
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🎡 عجلة الحظ</h2>

  <div id="wheel"></div>

  <button onclick="spin()">لف العجلة</button>
</div>

<script>
function spin() {
    let deg = Math.floor(Math.random() * 3600);
    document.getElementById("wheel").style.transform = "rotate(" + deg + "deg)";
}
</script>

</body>
</html>
