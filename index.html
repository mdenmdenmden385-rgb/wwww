<!DOCTYPE html>
<html>
<head>
  <title>Wheel</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    .container {
      position: relative;
      margin-top: 50px;
    }

    /* المؤشر */
    .pointer {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 30px solid red;
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    /* العجلة */
    #wheel {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      margin: 0 auto;
      transition: transform 4s ease-out;
      background: conic-gradient(
        #ffcc00 0deg 45deg,
        #ff4d4d 45deg 90deg,
        #4dff88 90deg 135deg,
        #4da6ff 135deg 180deg,
        #999 180deg 225deg,
        #ffcc00 225deg 270deg,
        #999 270deg 315deg,
        #ff4d4d 315deg 360deg
      );
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>🎡 عجلة الحظ</h2>

<div class="container">
  <div class="pointer"></div>
  <div id="wheel"></div>
</div>

<button onclick="spin()">لف العجلة</button>

<div id="result"></div>

<script>

const prizes = [
  "حظ أوفر",
  "1000 💰",
  "حظ أوفر",
  "2000 💰",
  "حظ أوفر",
  "5000 💰",
  "حظ أوفر",
  "10000 💰"
];

function spin() {

    // اختيار عشوائي مع نسب
    let rand = Math.random() * 100;
    let index;

    if (rand < 1) index = 7;        // 10000
    else if (rand < 6) index = 5;   // 5000
    else if (rand < 16) index = 3;  // 2000
    else if (rand < 31) index = 1;  // 1000
    else {
        let lose = [0,2,4,6];
        index = lose[Math.floor(Math.random()*lose.length)];
    }

    // كل خانة 45 درجة
    let degPerSlice = 45;

    // نحسب الدوران ليقف على الخانة
    let extraSpins = 360 * 5;
    let targetDeg = (index * degPerSlice) + (degPerSlice / 2);
    let finalDeg = extraSpins + (360 - targetDeg);

    document.getElementById("wheel").style.transform =
        "rotate(" + finalDeg + "deg)";

    setTimeout(() => {
        document.getElementById("result").innerHTML =
            "النتيجة: " + prizes[index];
    }, 4000);
}

</script>

</body>
</html>
